# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add custom package repo with ANN and correct version of h5hut
  repos:
    turbosph: spack_repo/turbosph
  definitions:
  # Need to use GCC 13 to build hdf5 v1.10
  - compilers: [gcc@13.4.0]
  - packages:
    - mpi
    - cmake
    - hdf5@1.10.5+cxx~mpi+hl api=v110  # need +hl for h5py
    - turbosph.h5hut@1.99.13~fortran~mpi
    - turbosph.ann@1.1.2
    # newer cython versions aren't capable of compiling the older version of h5py
    - py-cython@0.29.32
    - py-numpy ^py-cython@0.29.32
    - py-h5py ^py-cython@0.29.32
    # for profiling
    - binutils+gprofng
    - hpctoolkit~cuda~level_zero+mpi~opencl~rocm~viewer
    - intel-oneapi-vtune
    - likwid
  specs:
  - matrix:
    - [$packages]
    - [$%compilers]
  view: true
  concretizer:
    unify: true
